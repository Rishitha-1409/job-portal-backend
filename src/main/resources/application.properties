spring.application.name=job-portal-backend
server.port=8080

# ================= DATABASE (H2) =================
spring.datasource.url=jdbc:h2:mem:jobportal;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ================= JPA / HIBERNATE =================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ================= JWT =================
app.jwt.secret=c2VjdXJlc3VwZXJzZWNyZXRrZXlmb3Jqd3QxMjM0NTY3OA==
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ================= FILE UPLOAD =================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ================= LOGGING =================
logging.level.com.jobportal=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ================= PAGINATION =================
app.pagination.default-page-size=10
app.pagination.max-page-size=50